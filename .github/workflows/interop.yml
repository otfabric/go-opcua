name: Interop
run-name: "Interop (${{ github.event_name }}) on ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  packages: read

jobs:
  open62541:
    name: OPC UA interop — open62541
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run interop matrix
        env:
          # Digest-pinned opcua-interop v0.5.0 multi-arch indexes:
          # https://github.com/otfabric/opcua-interop/releases/tag/v0.5.0
          # Current digests: https://github.com/otfabric/opcua-interop/actions/runs/30127189340
          # Set OPEN62541_IMAGE / MILO_IMAGE in the env to test local builds.
          OPEN62541_IMAGE: ghcr.io/otfabric/opcua-interop-open62541@sha256:d9650e1b63fd0df1c840335d1951c848437530de0670c279ef905440a3bc77d6
          MILO_IMAGE: ghcr.io/otfabric/opcua-interop-milo@sha256:af502530b7043763220474d6dcf0deef62215e0b3c112cc8eab9849ec1d4e321
          OPCUA_INTEROP_REQUIRE_CAPABILITIES: "1"
        run: make interop

      - name: Collect Docker diagnostics
        if: failure()
        run: |
          mkdir -p artifacts
          docker ps -a > artifacts/docker-ps.txt || true
          docker images --digests > artifacts/docker-images.txt || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: go-opcua-interop-diagnostics
          path: artifacts/
          if-no-files-found: ignore
